<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Index and thumb pointing sideways (Letter G) -->
  <g transform="translate(30, 40)">
    <!-- Palm sideways -->
    <ellipse cx="70" cy="60" rx="30" ry="35" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Index finger pointing right -->
    <rect x="95" y="35" width="55" height="16" rx="8" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Thumb pointing right below index -->
    <rect x="95" y="65" width="40" height="14" rx="7" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Curled other fingers -->
    <ellipse cx="55" cy="75" rx="20" ry="15" fill="url(#skin)" stroke="#d4a574" stroke-width="1"/>
  </g>
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">G</text>
</svg>
