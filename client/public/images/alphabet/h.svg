<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Index and middle fingers pointing sideways (Letter H) -->
  <g transform="translate(25, 40)">
    <!-- Palm sideways -->
    <ellipse cx="55" cy="60" rx="28" ry="35" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Index finger pointing right -->
    <rect x="75" y="30" width="65" height="15" rx="7" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Middle finger pointing right -->
    <rect x="75" y="48" width="65" height="15" rx="7" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Thumb tucked -->
    <ellipse cx="55" cy="80" rx="15" ry="12" fill="url(#skin)" stroke="#d4a574" stroke-width="1"/>
  </g>
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">H</text>
</svg>
