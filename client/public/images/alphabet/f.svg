<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Thumb and index touching, other fingers spread (Letter F) -->
  <g transform="translate(40, 15)">
    <!-- Palm -->
    <rect x="30" y="95" width="55" height="40" rx="10" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Three fingers up and spread -->
    <rect x="40" y="20" width="12" height="65" rx="6" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <rect x="55" y="15" width="12" height="70" rx="6" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <rect x="70" y="20" width="11" height="65" rx="5" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Thumb and index making circle -->
    <ellipse cx="50" cy="100" rx="18" ry="15" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <ellipse cx="50" cy="100" rx="8" ry="6" fill="#f0f4ff" stroke="#d4a574" stroke-width="1"/>
  </g>
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">F</text>
</svg>
