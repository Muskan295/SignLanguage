<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Thumb between index and middle (Letter T) -->
  <g transform="translate(45, 28)">
    <!-- Fist base -->
    <ellipse cx="55" cy="80" rx="40" ry="45" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Curled fingers -->
    <rect x="22" y="45" width="65" height="30" rx="12" fill="url(#skin)" stroke="#d4a574" stroke-width="1"/>
    <!-- Thumb poking up between index and middle -->
    <ellipse cx="45" cy="42" rx="10" ry="18" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Knuckle line -->
    <path d="M28 60 Q55 53 82 60" fill="none" stroke="#d4a574" stroke-width="1.5"/>
  </g>
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">T</text>
</svg>
