<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Like K but pointing down (Letter P) -->
  <g transform="translate(35, 25)">
    <!-- Palm angled -->
    <ellipse cx="65" cy="55" rx="35" ry="32" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Index finger pointing down-left -->
    <rect x="25" y="70" width="14" height="55" rx="7" fill="url(#skin)" stroke="#d4a574" stroke-width="2" transform="rotate(-20, 32, 97)"/>
    <!-- Middle finger pointing down -->
    <rect x="55" y="75" width="14" height="55" rx="7" fill="url(#skin)" stroke="#d4a574" stroke-width="2" transform="rotate(10, 62, 102)"/>
    <!-- Thumb pointing down between -->
    <ellipse cx="50" cy="80" rx="8" ry="18" fill="url(#skin)" stroke="#d4a574" stroke-width="2" transform="rotate(-10, 50, 80)"/>
    <!-- Other fingers curled -->
    <ellipse cx="85" cy="55" rx="15" ry="18" fill="url(#skin)" stroke="#d4a574" stroke-width="1"/>
  </g>
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">P</text>
</svg>
