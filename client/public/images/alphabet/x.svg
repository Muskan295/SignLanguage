<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Index finger bent like hook (Letter X) -->
  <g transform="translate(45, 25)">
    <!-- Palm/Fist -->
    <ellipse cx="55" cy="90" rx="40" ry="42" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Index finger bent/hooked -->
    <path d="M40 50 L40 30 Q40 20 50 20 Q60 20 60 30 L60 45 Q60 55 50 55 Q42 55 40 50" 
          fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Other curled fingers -->
    <rect x="55" y="55" width="35" height="25" rx="10" fill="url(#skin)" stroke="#d4a574" stroke-width="1"/>
    <!-- Thumb across -->
    <ellipse cx="28" cy="85" rx="12" ry="18" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Knuckle line -->
    <path d="M50 70 Q70 65 85 70" fill="none" stroke="#d4a574" stroke-width="1"/>
  </g>
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">X</text>
</svg>
