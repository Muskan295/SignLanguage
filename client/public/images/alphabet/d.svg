<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Index finger up, others curled touching thumb (Letter D) -->
  <g transform="translate(45, 20)">
    <!-- Palm -->
    <ellipse cx="55" cy="100" rx="35" ry="40" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Index finger pointing up -->
    <rect x="48" y="15" width="16" height="70" rx="8" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Curled fingers forming circle with thumb -->
    <ellipse cx="55" cy="85" rx="25" ry="20" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Circle hole in middle -->
    <ellipse cx="55" cy="85" rx="10" ry="8" fill="#f0f4ff" stroke="#d4a574" stroke-width="1"/>
  </g>
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">D</text>
</svg>
