<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Index and middle up in V, thumb between them (Letter K) -->
  <g transform="translate(40, 20)">
    <!-- Palm -->
    <ellipse cx="60" cy="100" rx="38" ry="40" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Index finger up-left -->
    <rect x="35" y="20" width="14" height="65" rx="7" fill="url(#skin)" stroke="#d4a574" stroke-width="2" transform="rotate(-15, 42, 52)"/>
    <!-- Middle finger up-right -->
    <rect x="60" y="18" width="14" height="65" rx="7" fill="url(#skin)" stroke="#d4a574" stroke-width="2" transform="rotate(15, 67, 50)"/>
    <!-- Thumb between fingers -->
    <ellipse cx="55" cy="60" rx="8" ry="20" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Other fingers curled -->
    <ellipse cx="75" cy="105" rx="15" ry="12" fill="url(#skin)" stroke="#d4a574" stroke-width="1"/>
  </g>
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">K</text>
</svg>
