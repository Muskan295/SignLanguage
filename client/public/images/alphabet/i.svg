<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Pinky finger up, others closed (Letter I) -->
  <g transform="translate(45, 25)">
    <!-- Palm/Fist -->
    <ellipse cx="50" cy="90" rx="38" ry="42" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Curled fingers -->
    <rect x="20" y="55" width="55" height="30" rx="12" fill="url(#skin)" stroke="#d4a574" stroke-width="1"/>
    <!-- Pinky up -->
    <rect x="75" y="20" width="12" height="55" rx="6" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Thumb across -->
    <ellipse cx="20" cy="85" rx="12" ry="18" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Knuckle line -->
    <path d="M25 65 Q50 58 70 65" fill="none" stroke="#d4a574" stroke-width="1.5"/>
  </g>
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">I</text>
</svg>
