<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Thumb and pinky out, others curled (Letter Y - "hang loose") -->
  <g transform="translate(40, 25)">
    <!-- Palm/Fist -->
    <ellipse cx="60" cy="85" rx="38" ry="42" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Curled middle fingers -->
    <rect x="35" y="50" width="45" height="28" rx="12" fill="url(#skin)" stroke="#d4a574" stroke-width="1"/>
    <!-- Thumb out to side -->
    <rect x="5" y="55" width="35" height="14" rx="7" fill="url(#skin)" stroke="#d4a574" stroke-width="2" transform="rotate(-25, 22, 62)"/>
    <!-- Pinky up -->
    <rect x="85" y="20" width="12" height="55" rx="6" fill="url(#skin)" stroke="#d4a574" stroke-width="2" transform="rotate(15, 91, 47)"/>
    <!-- Knuckle line -->
    <path d="M40 68 Q60 62 78 68" fill="none" stroke="#d4a574" stroke-width="1.5"/>
  </g>
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">Y</text>
</svg>
