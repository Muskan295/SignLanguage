<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Flat hand, fingers together, thumb across palm (Letter B) -->
  <g transform="translate(50, 15)">
    <!-- Palm -->
    <rect x="20" y="90" width="60" height="50" rx="10" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Fingers pointing up -->
    <rect x="20" y="20" width="14" height="75" rx="7" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <rect x="36" y="15" width="14" height="80" rx="7" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <rect x="52" y="15" width="14" height="80" rx="7" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <rect x="68" y="25" width="12" height="70" rx="6" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Thumb across palm -->
    <ellipse cx="30" cy="115" rx="20" ry="10" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
  </g>
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">B</text>
</svg>
