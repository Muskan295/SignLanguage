<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Like G but pointing down (Letter Q) -->
  <g transform="translate(35, 20)">
    <!-- Palm -->
    <ellipse cx="65" cy="50" rx="32" ry="30" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Index finger pointing down -->
    <rect x="40" y="70" width="14" height="55" rx="7" fill="url(#skin)" stroke="#d4a574" stroke-width="2" transform="rotate(-15, 47, 97)"/>
    <!-- Thumb pointing down -->
    <rect x="65" y="70" width="13" height="45" rx="6" fill="url(#skin)" stroke="#d4a574" stroke-width="2" transform="rotate(15, 71, 92)"/>
    <!-- Other fingers curled -->
    <ellipse cx="80" cy="45" rx="18" ry="20" fill="url(#skin)" stroke="#d4a574" stroke-width="1"/>
  </g>
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">Q</text>
</svg>
