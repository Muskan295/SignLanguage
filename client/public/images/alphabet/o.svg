<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Fingers curved to touch thumb making O (Letter O) -->
  <g transform="translate(35, 25)">
    <!-- O shape formed by fingers and thumb -->
    <ellipse cx="65" cy="70" rx="45" ry="50" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Hole in middle -->
    <ellipse cx="65" cy="70" rx="20" ry="22" fill="#f0f4ff" stroke="#d4a574" stroke-width="2"/>
    <!-- Finger curve lines -->
    <path d="M40 35 Q30 70 40 105" fill="none" stroke="#d4a574" stroke-width="1.5"/>
    <path d="M90 35 Q100 70 90 105" fill="none" stroke="#d4a574" stroke-width="1.5"/>
  </g>
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">O</text>
</svg>
