<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Index, middle, ring spread (Letter W) -->
  <g transform="translate(38, 20)">
    <!-- Palm -->
    <ellipse cx="62" cy="105" rx="40" ry="38" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Index finger up-left -->
    <rect x="25" y="18" width="13" height="68" rx="6" fill="url(#skin)" stroke="#d4a574" stroke-width="2" transform="rotate(-18, 31, 52)"/>
    <!-- Middle finger up -->
    <rect x="52" y="12" width="14" height="73" rx="7" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Ring finger up-right -->
    <rect x="78" y="18" width="13" height="68" rx="6" fill="url(#skin)" stroke="#d4a574" stroke-width="2" transform="rotate(18, 84, 52)"/>
    <!-- Thumb holding pinky -->
    <ellipse cx="40" cy="105" rx="18" ry="12" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
  </g>
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">W</text>
</svg>
