<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Index and middle crossed (Letter R) -->
  <g transform="translate(45, 20)">
    <!-- Palm -->
    <ellipse cx="55" cy="100" rx="38" ry="38" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Index finger -->
    <rect x="35" y="20" width="14" height="65" rx="7" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Middle finger crossed over -->
    <rect x="52" y="18" width="14" height="65" rx="7" fill="url(#skin)" stroke="#d4a574" stroke-width="2" transform="rotate(12, 59, 50)"/>
    <!-- Cross point highlight -->
    <ellipse cx="52" cy="55" rx="5" ry="5" fill="#d4a574" opacity="0.3"/>
    <!-- Thumb across palm -->
    <ellipse cx="30" cy="95" rx="15" ry="10" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Other fingers curled -->
    <ellipse cx="70" cy="105" rx="18" ry="15" fill="url(#skin)" stroke="#d4a574" stroke-width="1"/>
  </g>
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">R</text>
</svg>
