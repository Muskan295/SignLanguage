<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Fist with thumb on side (Letter A) -->
  <g transform="translate(50, 30)">
    <!-- Palm -->
    <ellipse cx="50" cy="90" rx="40" ry="50" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Fingers curled -->
    <rect x="20" y="50" width="60" height="35" rx="15" fill="url(#skin)" stroke="#d4a574" stroke-width="1"/>
    <!-- Thumb on side -->
    <ellipse cx="85" cy="75" rx="12" ry="25" fill="url(#skin)" stroke="#d4a574" stroke-width="2" transform="rotate(15, 85, 75)"/>
    <!-- Knuckle lines -->
    <path d="M30 65 Q50 60 70 65" fill="none" stroke="#d4a574" stroke-width="1.5"/>
  </g>
  <!-- Label -->
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">A</text>
</svg>
