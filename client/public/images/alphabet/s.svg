<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Fist with thumb across fingers (Letter S) -->
  <g transform="translate(45, 28)">
    <!-- Fist -->
    <ellipse cx="55" cy="80" rx="42" ry="48" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Curled fingers at top -->
    <rect x="20" y="45" width="70" height="32" rx="14" fill="url(#skin)" stroke="#d4a574" stroke-width="1"/>
    <!-- Thumb across front -->
    <ellipse cx="55" cy="100" rx="25" ry="12" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Knuckle lines -->
    <path d="M25 58 Q55 52 85 58" fill="none" stroke="#d4a574" stroke-width="1.5"/>
    <path d="M30 68 Q55 65 80 68" fill="none" stroke="#d4a574" stroke-width="1"/>
  </g>
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">S</text>
</svg>
