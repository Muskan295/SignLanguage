<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Curved hand making C shape -->
  <g transform="translate(40, 25)">
    <!-- Curved C shape -->
    <path d="M100 50 Q120 80, 100 110 Q70 130, 40 110 Q20 80, 40 50 Q70 30, 100 50" 
          fill="none" stroke="url(#skin)" stroke-width="30" stroke-linecap="round"/>
    <path d="M100 50 Q120 80, 100 110 Q70 130, 40 110 Q20 80, 40 50 Q70 30, 100 50" 
          fill="none" stroke="#d4a574" stroke-width="2"/>
    <!-- Inner C line -->
    <path d="M85 55 Q100 80, 85 105 Q65 120, 50 105 Q35 80, 50 55 Q65 40, 85 55" 
          fill="none" stroke="#d4a574" stroke-width="1"/>
  </g>
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">C</text>
</svg>
