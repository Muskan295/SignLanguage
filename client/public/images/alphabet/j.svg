<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Pinky drawing J shape (Letter J) -->
  <g transform="translate(40, 25)">
    <!-- Palm/Fist -->
    <ellipse cx="50" cy="85" rx="35" ry="40" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Curled fingers -->
    <rect x="22" y="50" width="50" height="28" rx="12" fill="url(#skin)" stroke="#d4a574" stroke-width="1"/>
    <!-- Pinky curving -->
    <path d="M75 55 Q90 40 95 55 Q100 80 80 95" fill="none" stroke="url(#skin)" stroke-width="14" stroke-linecap="round"/>
    <path d="M75 55 Q90 40 95 55 Q100 80 80 95" fill="none" stroke="#d4a574" stroke-width="2"/>
    <!-- J motion arrow -->
    <path d="M105 30 Q115 35 110 50 Q105 65 95 75" fill="none" stroke="#6b8dd9" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="92,78 98,72 100,80" fill="#6b8dd9"/>
    <!-- Thumb -->
    <ellipse cx="22" cy="80" rx="10" ry="15" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
  </g>
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">J</text>
</svg>
