<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Index finger drawing Z shape (Letter Z) -->
  <g transform="translate(45, 30)">
    <!-- Palm/Fist -->
    <ellipse cx="55" cy="85" rx="35" ry="38" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Index finger pointing -->
    <rect x="48" y="15" width="14" height="55" rx="7" fill="url(#skin)" stroke="#d4a574" stroke-width="2" transform="rotate(5, 55, 42)"/>
    <!-- Curled fingers -->
    <rect x="60" y="55" width="28" height="22" rx="10" fill="url(#skin)" stroke="#d4a574" stroke-width="1"/>
    <!-- Thumb -->
    <ellipse cx="30" cy="80" rx="12" ry="16" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Z motion path -->
    <path d="M75 25 L105 25 L75 60 L105 60" fill="none" stroke="#6b8dd9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="5,3"/>
    <polygon points="105,56 108,64 100,62" fill="#6b8dd9"/>
  </g>
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">Z</text>
</svg>
