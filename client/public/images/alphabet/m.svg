<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5b8"/>
      <stop offset="100%" style="stop-color:#e8b896"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="#f0f4ff"/>
  <!-- Thumb under 3 fingers (Letter M) -->
  <g transform="translate(40, 30)">
    <!-- Palm/Fist base -->
    <ellipse cx="60" cy="85" rx="45" ry="40" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Three fingers curled over thumb -->
    <ellipse cx="35" cy="55" rx="12" ry="20" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <ellipse cx="55" cy="50" rx="12" ry="22" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <ellipse cx="75" cy="55" rx="12" ry="20" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Thumb peeking out -->
    <ellipse cx="90" cy="95" rx="12" ry="18" fill="url(#skin)" stroke="#d4a574" stroke-width="2"/>
    <!-- Knuckle lines -->
    <path d="M25 70 Q55 62 90 70" fill="none" stroke="#d4a574" stroke-width="1.5"/>
  </g>
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#6b8dd9" text-anchor="middle">M</text>
</svg>
